
services:
  - type: web
    name: launchgate-api
    env: python
    plan: free
    rootDir: .
    buildCommand: |
      pip install uv
      python scripts/write_agent_config.py
      cd backend
      uv sync
      cd ../agents
      uv sync
    startCommand: |
      python scripts/start_render_service.py
    envVars:
      - key: BAND_REST_URL
        value: https://app.band.ai
      - key: BAND_WS_URL
        value: wss://app.band.ai/api/v1/socket/websocket
      - key: AIMLAPI_BASE_URL
        value: https://api.aimlapi.com/v1
      - key: START_AGENTS
        value: "true"
